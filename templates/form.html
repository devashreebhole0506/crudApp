<html>

<head>
    <title>Student Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
        }

        td {
            padding: 8px;
            vertical-align: middle;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
        }

        .gender-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .gender-group label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Registration Form</h2>


        <form action="/api/students" method="post">

            <table>

                <tr>
                    <td>Full Name:</td>
                    <td><input type="text" name="name"></td>
                </tr>

                <tr>
                    <td>Address:</td>
                    <td><textarea name="address" rows="3"> </textarea></td>
                </tr>

                <tr>
                    <td>Mobile Number:</td>
                    <td><input type="text" name="mobile"></td>
                </tr>

                <tr>
                    <td>Email ID:</td>
                    <td><input type="email" name="email"></td>
                </tr>

                <tr>
                    <td>Education:</td>
                    <td>
                        <select name="education">
                            <option value="">--Select--</option>
                            <option {% if request.form.education=='SSC' %}selected{% endif %}>SSC</option>
                            <option {% if request.form.education=='HSC' %}selected{% endif %}>HSC</option>
                            <option {% if request.form.education=='Diploma' %}selected{% endif %}>Diploma</option>
                            <option {% if request.form.education=='Graduate' %}selected{% endif %}>Graduate</option>
                            <option {% if request.form.education=='Postgraduate' %}selected{% endif %}>Postgraduate
                            </option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Department:</td>
                    <td>
                        <select name="department">
                            <option value="">--Select--</option>
                            <option>Computer Science</option>
                            <option>Mechanical</option>
                            <option>Electrical</option>
                            <option>Civil</option>
                            <option>Chemical</option>
                            <option>Electronics</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Gender:</td>
                    <td class="gender-group">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                        <label><input type="radio" name="gender" value="Other"> Other</label>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <button type="submit">Submit</button>
                    </td>
                </tr>

            </table>

        </form>

    </div>

</body>

</html>
